<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Search</title>
    <link rel="stylesheet" href="stylesheets/style.css">
</head>
<body>
    <div class="wrapper">
        <header class="header item">
            <h1>Pokemon Search</h1>
        </header>
        <section class="search item">
            <input class="text" type="text" placeholder="Search for a Pokemon">
            <input class="button" type="button" value="Go">
        </section>
        <section class="display item">
            <div class="sprite-wrapper">
                <img class="sprite" src="" alt="Pokemon sprite">
            </div>
            <div class="data">
                <div class="name">
                    <div class="label">Name</div>
                    <div class="name-field field"></div>
                </div>
                <div class="types">
                    <div class="label">Types</div>
                    <div class="types-field field">
                        <div class="type-one type"></div>
                        <div class="type-two type"></div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script type="module" src="scripts/main.js" defer></script>
    <script type="module" src="scripts/types.js" defer></script>
</body>
</html>
